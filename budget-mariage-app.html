<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#FAF6EE" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Budget Mariage" />
<title>Budget Mariage</title>
<style>
  :root {
    --cream: #FAF6EE;
    --ivory: #FFFDF8;
    --gold: #B89968;
    --gold-soft: #D9C39A;
    --gold-deep: #8C7344;
    --ink: #3A3127;
    --ink-soft: #6B5E4E;
    --line: rgba(184, 153, 104, .2);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'Avenir Next', 'Helvetica Neue', sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: calc(16px + env(safe-area-inset-top)) 16px calc(120px + env(safe-area-inset-bottom));
  }

  /* === HEADER === */
  .header {
    text-align: center;
    padding: 24px 0 32px;
  }

  h1 {
    font-family: 'Didot', 'Bodoni 72', 'Hoefler Text', serif;
    font-size: 42px;
    font-style: italic;
    margin: 0 0 8px;
    color: var(--ink);
    letter-spacing: .01em;
    font-weight: 400;
  }

  .tagline {
    font-family: 'Hoefler Text', 'Didot', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--ink-soft);
    letter-spacing: .05em;
    margin: 0;
  }

  /* === HEADER WELCOME === */
  .header-welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 0;
    background: transparent;
    border: none;
    border-radius: 0;
    margin-bottom: 24px;
  }

  .logo-section {
    flex-shrink: 0;
    padding: 20px 0;
    border-bottom: 1px solid var(--line);
    width: 100%;
    text-align: center;
  }

  .logo {
    width: 100px;
    height: 100px;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.1));
  }

  .welcome-content {
    flex: 1;
    width: 100%;
    padding: 20px;
    background: linear-gradient(180deg, var(--ivory) 0%, #ffffff 100%);
    border: 1px solid var(--line);
    border-top: none;
    border-bottom-left-radius: 14px;
    border-bottom-right-radius: 14px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    text-align: center;
  }

  .couple-names {
    font-family: 'Didot', serif;
    font-size: 32px;
    font-style: italic;
    margin: 0;
    color: var(--ink);
    letter-spacing: .01em;
    font-weight: 400;
  }

  .welcome-summary {
    display: flex;
    gap: 16px;
    justify-content: center;
    font-size: 12px;
    padding: 16px 0;
    border-top: 1px solid rgba(184, 153, 104, 0.2);
    border-bottom: 1px solid rgba(184, 153, 104, 0.2);
  }

  .summary-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 80px;
  }

  .summary-label {
    font-family: 'Hoefler Text', serif;
    color: var(--gold-deep);
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-size: 10px;
  }

  .summary-value {
    font-family: 'Hoefler Text', serif;
    color: var(--ink);
    font-size: 15px;
    font-weight: 500;
  }

  .total-preview {
    padding: 16px;
    background: linear-gradient(135deg, #E8D5B7 0%, #F0E0C8 100%);
    border: 1px solid var(--gold);
    border-radius: 10px;
    text-align: center;
  }

  .total-preview-label {
    font-family: 'Hoefler Text', serif;
    font-size: 11px;
    color: var(--gold-deep);
    font-style: italic;
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .total-preview-value {
    font-family: 'Didot', serif;
    font-size: 32px;
    font-style: italic;
    color: var(--ink);
  }

  /* === METADATA === */
  .meta {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin: 20px 0 28px;
    padding: 16px;
    background: var(--ivory);
    border: 1px solid var(--line);
    border-radius: 14px;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }

  .meta-row label {
    font-family: 'Hoefler Text', serif;
    font-size: 12px;
    color: var(--gold-deep);
    text-transform: uppercase;
    letter-spacing: .1em;
    min-width: 80px;
  }

  .meta-row input {
    flex: 1;
    border: none;
    border-bottom: 1px solid var(--line);
    background: transparent;
    padding: 6px 0;
    font-family: 'Hoefler Text', serif;
    font-size: 15px;
    color: var(--ink);
  }

  .meta-row input:focus {
    outline: none;
    border-bottom-color: var(--gold);
  }

  /* === CATÉGORIES === */
  .category {
    margin-bottom: 20px;
  }

  .cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--gold-soft);
    border-radius: 12px 12px 0 0;
    border-bottom: 1px solid var(--line);
  }

  .cat-name {
    font-family: 'Didot', serif;
    font-size: 18px;
    font-style: italic;
    color: var(--ink);
    margin: 0;
    letter-spacing: .01em;
  }

  .cat-total {
    font-family: 'Hoefler Text', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--gold-deep);
  }

  .cat-total strong {
    font-style: normal;
    font-weight: 500;
    color: var(--ink);
    margin-left: 4px;
  }

  /* === ITEMS === */
  .items {
    background: var(--ivory);
    border: 1px solid var(--line);
    border-top: none;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(184, 153, 104, .1);
    transition: background .15s;
  }

  .item:last-child {
    border-bottom: none;
  }

  .item:active {
    background: rgba(184, 153, 104, .08);
  }

  .item input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: var(--gold);
    flex-shrink: 0;
  }

  .item-label {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .item-name {
    font-family: 'Hoefler Text', serif;
    font-size: 15px;
    color: var(--ink);
    margin: 0;
  }

  .item input[type="checkbox"]:checked ~ .item-label .item-name {
    color: var(--ink-soft);
    text-decoration: line-through;
  }

  .item-budget {
    display: flex;
    gap: 8px;
    font-size: 12px;
  }

  .item-budget span {
    color: var(--ink-soft);
    font-style: italic;
  }

  .item-budget strong {
    color: var(--gold-deep);
    font-style: normal;
  }

  .item-inputs {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .budget-input {
    width: 70px;
    padding: 6px 8px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--cream);
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    color: var(--ink);
    text-align: right;
    -moz-appearance: textfield;
  }

  .budget-input::-webkit-outer-spin-button,
  .budget-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .budget-input:focus {
    outline: none;
    border-color: var(--gold);
    background: white;
  }

  /* === BOUTON AJOUTER === */
  .add-btn {
    display: block;
    width: calc(100% - 28px);
    margin: 10px 14px;
    padding: 10px 14px;
    border: 1px dashed var(--gold-soft);
    background: transparent;
    color: var(--gold-deep);
    font-family: 'Hoefler Text', serif;
    font-style: italic;
    font-size: 13px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .15s;
    -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
  }

  .add-btn:active {
    background: var(--gold-soft);
    border-style: solid;
  }

  /* === BOUTON SUPPRIMER === */
  .del-btn {
    width: 28px;
    height: 28px;
    padding: 0;
    border: 1px solid #c97a7a;
    background: transparent;
    color: #b04141;
    font-size: 18px;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all .15s;
    -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
    line-height: 1;
  }

  .del-btn:active {
    background: #b04141;
    color: white;
  }

  /* === TOTAL GÉNÉRAL === */
  .grand-total {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(180deg, rgba(250, 246, 238, 0), rgba(250, 246, 238, .98));
    border-top: 1px solid var(--line);
    z-index: 10;
  }

  .total-content {
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .total-label {
    font-family: 'Hoefler Text', serif;
    font-style: italic;
    color: var(--gold-deep);
    font-size: 12px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .total-value {
    font-family: 'Didot', serif;
    font-size: 32px;
    font-style: italic;
    color: var(--ink);
    letter-spacing: .01em;
  }

  .total-value span {
    font-size: 20px;
    color: var(--gold-deep);
  }

  /* === ACTIONS === */
  .actions {
    position: fixed;
    bottom: calc(70px + env(safe-area-inset-bottom));
    left: 0;
    right: 0;
    display: flex;
    gap: 8px;
    justify-content: center;
    padding: 12px 16px;
    background: rgba(250, 246, 238, .95);
    z-index: 9;
  }

  .btn {
    flex: 1;
    max-width: 110px;
    padding: 11px 12px;
    border: 1px solid var(--gold-soft);
    background: var(--ivory);
    color: var(--gold-deep);
    font-family: 'Hoefler Text', serif;
    font-size: 13px;
    letter-spacing: .04em;
    border-radius: 999px;
    cursor: pointer;
    transition: all .15s;
    -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
  }

  .btn:active {
    transform: scale(.96);
    background: var(--gold);
    color: var(--ivory);
    border-color: var(--gold);
  }

  .btn.danger:active {
    background: #b04141;
    border-color: #b04141;
    color: white;
  }

  /* === SAVED INDICATOR === */
  .saved {
    position: fixed;
    top: calc(16px + env(safe-area-inset-top));
    right: 16px;
    background: var(--ivory);
    border: 1px solid var(--gold-soft);
    color: var(--gold-deep);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-family: 'Hoefler Text', serif;
    font-style: italic;
    opacity: 0;
    transition: opacity .3s;
    z-index: 20;
    pointer-events: none;
  }

  .saved.show {
    opacity: 1;
  }

  /* === MODAL === */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(58, 49, 39, .5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .modal-bg.show {
    display: flex;
  }

  .modal {
    background: var(--cream);
    border-radius: 16px;
    border: 1px solid var(--gold-soft);
    max-width: 380px;
    width: 100%;
    padding: 24px 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, .2);
    max-height: 80vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .modal h2 {
    font-family: 'Didot', serif;
    font-size: 24px;
    font-style: italic;
    margin: 0 0 8px;
    color: var(--ink);
    text-align: center;
  }

  .modal p {
    font-family: 'Hoefler Text', serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 13px;
    text-align: center;
    margin: 0 0 16px;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .modal .btn {
    flex: 1;
    max-width: none;
    min-width: 140px;
  }

  .modal-close {
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-family: 'Hoefler Text', serif;
    font-size: 13px;
    cursor: pointer;
    text-decoration: underline;
    padding: 8px;
    margin-top: 8px;
    width: 100%;
  }

  /* === RESPONSIVE === */
  @media (max-height: 700px) {
    h1 { font-size: 36px; }
    .container { padding-bottom: 140px; }
  }

  @media print {
    .actions, .grand-total, .saved, .modal-bg { display: none !important; }
    .container { padding: 0; }
  }
</style>
</head>

    <button class="modal-close" data-close>Annuler</button>
  </div>

<script>
const CATEGORIES = [
  {name: 'Lieu', items: ['Location', 'Sécurité', 'Ménage', 'Hébergement', 'Caution']},
  {name: 'Matériel', items: ['Tables & chaises', 'Tente', 'Sonorisation', 'Informatique', 'Électrogène']},
  {name: 'Restauration', items: ['Apéritif', 'Boissons', 'Entrée', 'Plat', 'Enfants', 'Dessert', 'Vin', 'Champagne', 'Digestifs', 'Pain', 'Pièce montée']},
  {name: 'Décoration', items: ['Murs', 'Tables', 'Lumières', 'Fleurs', 'Bouquet', 'Boutonnières']},
  {name: 'Animation', items: ['DJ', 'Musique', 'Éclairage', 'Restauration', 'Enfants', 'Feu d\'artifice']},
  {name: 'Photo & Vidéo', items: ['Photographe', 'Vidéaste', 'Photobooth', 'Album', 'Drone']},
  {name: 'Papeterie', items: ['Graphiste', 'Impression', 'Envois', 'Faire-part', 'Menus', 'Livre d\'or']},
  {name: 'Tenues', items: ['Robe', 'Costume', 'Chaussures', 'Accessoires', 'Alliances', 'Bijoux', 'Retouches']},
  {name: 'Beauté', items: ['Coiffure', 'Maquillage', 'Soins', 'Essais', 'Manucure', 'SPA']},
  {name: 'Cérémonie', items: ['Mairie', 'Officiant', 'Livret', 'Wedding planner']},
  {name: 'Transport', items: ['Voiture', 'Navettes', 'Carburant', 'Parking']},
  {name: 'Cadeaux', items: ['Dragées', 'Témoins', 'Parents']},
  {name: 'Voyage', items: ['Transport', 'Hôtel', 'Repas', 'Activités']},
  {name: 'Divers', items: ['Pourboires', 'Assurance', 'Imprévus']},
];

const STORAGE_KEY = 'budget-mariage';
let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {meta: {}, items: {}, custom: {}};

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  showSaved();
}

function showSaved() {
  const el = document.getElementById('saved');
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 1200);
}

function render() {
  // Meta
  document.getElementById('couple').value = state.meta.couple || '';
  document.getElementById('date').value = state.meta.date || '';
  document.getElementById('guests').value = state.meta.guests || '';

  document.getElementById('couple').oninput = (e) => {
    state.meta.couple = e.target.value;
    updateWelcome();
    save();
  };
  document.getElementById('date').oninput = (e) => {
    state.meta.date = e.target.value;
    updateWelcome();
    save();
  };
  document.getElementById('guests').oninput = (e) => {
    state.meta.guests = e.target.value;
    updateWelcome();
    save();
  };

  // Categories (reste du code...)
  const catContainer = document.getElementById('categories');
  catContainer.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const catDiv = document.createElement('div');
    catDiv.className = 'category';

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `
      <h3 class="cat-name">${cat.name}</h3>
      <div class="cat-total">Total <strong><span data-cat="${cat.name}">0</span> €</strong></div>
    `;
    catDiv.appendChild(header);

    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'items';

    // Items standard
    cat.items.forEach((item, idx) => {
      const key = `${cat.name}:${idx}`;
      const data = state.items[key] || {done: false, prev: 0, real: 0};
      const itemEl = makeItemElement(key, item, data, false, null);
      itemsDiv.appendChild(itemEl);
    });

    // Items custom
    if(state.custom[cat.name]) {
      state.custom[cat.name].forEach((custom, cidx) => {
        const key = `${cat.name}:custom:${cidx}`;
        const itemEl = makeItemElement(key, custom.name, {done: custom.done, prev: custom.prev, real: custom.real}, true, {cat: cat.name, idx: cidx});
        itemsDiv.appendChild(itemEl);
      });
    }

    catDiv.appendChild(itemsDiv);

    // Bouton ajouter
    const addBtn = document.createElement('button');
    addBtn.className = 'add-btn';
    addBtn.textContent = '+ Ajouter';
    addBtn.onclick = () => {
      if(!state.custom[cat.name]) state.custom[cat.name] = [];
      state.custom[cat.name].push({name: '', done: false, prev: 0, real: 0});
      save();
      render();
    };
    catDiv.appendChild(addBtn);

    catContainer.appendChild(catDiv);
  });

  updateTotals();
  updateWelcome();
}

function makeItemElement(key, itemName, data, isCustom, customInfo) {
  const itemEl = document.createElement('label');
  itemEl.className = 'item';
  
  if(isCustom) {
    itemEl.innerHTML = `
      <input type="checkbox" ${data.done ? 'checked' : ''}>
      <div class="item-label">
        <input type="text" class="custom-name" value="${itemName}" placeholder="Nouveau poste…" style="font-family: 'Hoefler Text', serif; font-size: 15px; border: none; background: transparent; padding: 0; color: var(--ink); width: 100%; border-bottom: 1px dashed var(--line);">
        <div class="item-budget" style="display:${(data.prev || data.real) ? 'flex' : 'none'}">
          <span>Prévu: <strong>${data.prev || 0}</strong> €</span>
          <span>Réel: <strong>${data.real || 0}</strong> €</span>
        </div>
      </div>
      <div class="item-inputs">
        <input type="number" class="budget-input prev" inputmode="decimal" placeholder="0" value="${data.prev || ''}">
        <input type="number" class="budget-input real" inputmode="decimal" placeholder="0" value="${data.real || ''}">
        <button class="del-btn">×</button>
      </div>
    `;
  } else {
    itemEl.innerHTML = `
      <input type="checkbox" ${data.done ? 'checked' : ''}>
      <div class="item-label">
        <p class="item-name">${itemName}</p>
        <div class="item-budget" style="display:${(data.prev || data.real) ? 'flex' : 'none'}">
          <span>Prévu: <strong>${data.prev || 0}</strong> €</span>
          <span>Réel: <strong>${data.real || 0}</strong> €</span>
        </div>
      </div>
      <div class="item-inputs">
        <input type="number" class="budget-input prev" inputmode="decimal" placeholder="0" value="${data.prev || ''}">
        <input type="number" class="budget-input real" inputmode="decimal" placeholder="0" value="${data.real || ''}">
      </div>
    `;
  }

  const checkbox = itemEl.querySelector('input[type="checkbox"]');
  checkbox.onchange = () => {
    data.done = checkbox.checked;
    save();
    itemEl.querySelector('.item-budget').style.display = (data.prev || data.real) ? 'flex' : 'none';
  };

  const prevInput = itemEl.querySelector('.prev');
  const realInput = itemEl.querySelector('.real');

  prevInput.oninput = () => {
    data.prev = prevInput.value ? parseInt(prevInput.value) : 0;
    save();
    updateTotals();
    itemEl.querySelector('.item-budget').style.display = (data.prev || data.real) ? 'flex' : 'none';
  };

  realInput.oninput = () => {
    data.real = realInput.value ? parseInt(realInput.value) : 0;
    save();
    updateTotals();
    itemEl.querySelector('.item-budget').style.display = (data.prev || data.real) ? 'flex' : 'none';
  };

  if(isCustom) {
    const customInput = itemEl.querySelector('.custom-name');
    customInput.oninput = () => {
      state.custom[customInfo.cat][customInfo.idx].name = customInput.value;
      save();
    };

    const delBtn = itemEl.querySelector('.del-btn');
    delBtn.onclick = (e) => {
      e.preventDefault();
      state.custom[customInfo.cat].splice(customInfo.idx, 1);
      save();
      render();
    };
  }

  return itemEl;
}

function updateTotals() {
  CATEGORIES.forEach(cat => {
    let total = 0;
    // Items standard
    cat.items.forEach((_, idx) => {
      const key = `${cat.name}:${idx}`;
      const data = state.items[key] || {};
      total += (data.prev || 0);
    });
    // Items custom
    if(state.custom[cat.name]) {
      state.custom[cat.name].forEach(custom => {
        total += (custom.prev || 0);
      });
    }
    document.querySelector(`[data-cat="${cat.name}"]`).textContent = total;
  });

  let grandTotal = 0;
  Object.values(state.items).forEach(item => {
    grandTotal += (item.prev || 0);
  });
  if(state.custom) {
    Object.values(state.custom).forEach(customList => {
      if(Array.isArray(customList)) {
        customList.forEach(custom => {
          grandTotal += (custom.prev || 0);
        });
      }
    });
  }
  document.getElementById('totalValue').textContent = grandTotal;
  document.getElementById('totalPreview').textContent = grandTotal;
}

function updateWelcome() {
  const couple = state.meta.couple || '';
  let coupleDisplay = 'Budget Mariage';
  
  if (couple.trim()) {
    coupleDisplay = `Budget mariage de ${couple}`;
  }
  
  const date = state.meta.date ? new Date(state.meta.date).toLocaleDateString('fr-FR') : '—';
  const guests = state.meta.guests || '—';
  
  document.getElementById('coupleDisplay').textContent = coupleDisplay;
  document.getElementById('dateDisplay').textContent = date;
  document.getElementById('guestsDisplay').textContent = guests;
}

// Modal
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.onclick = () => btn.closest('.modal-bg').classList.remove('show');
});

document.getElementById('btnShare').onclick = () => document.getElementById('modalShare').classList.add('show');
document.getElementById('btnExport').onclick = () => document.getElementById('modalExport').classList.add('show');

document.getElementById('btnShareText').onclick = () => {
  const lines = [];
  lines.push('💍 BUDGET MARIAGE');
  if(state.meta.couple) lines.push(state.meta.couple);
  if(state.meta.date) lines.push('Date : ' + new Date(state.meta.date).toLocaleDateString('fr-FR'));
  if(state.meta.guests) lines.push('Invités : ' + state.meta.guests);
  lines.push('');

  let total = 0;
  CATEGORIES.forEach(cat => {
    let catTotal = 0;
    const items = [];
    
    // Items standard
    cat.items.forEach((name, idx) => {
      const key = `${cat.name}:${idx}`;
      const data = state.items[key] || {};
      if(data.prev) {
        items.push(`  • ${name} : ${data.prev} €`);
        catTotal += data.prev;
      }
    });
    
    // Items custom
    if(state.custom[cat.name]) {
      state.custom[cat.name].forEach(custom => {
        if(custom.prev) {
          items.push(`  • ${custom.name} : ${custom.prev} €`);
          catTotal += custom.prev;
        }
      });
    }
    
    if(items.length) {
      lines.push(`${cat.name} — ${catTotal} €`);
      lines.push(...items);
      lines.push('');
      total += catTotal;
    }
  });
  lines.push(`TOTAL : ${total} €`);

  const text = lines.join('\n');
  navigator.share ? navigator.share({title: 'Budget Mariage', text}) : navigator.clipboard.writeText(text);
  document.getElementById('modalShare').classList.remove('show');
};

document.getElementById('btnPrint').onclick = () => {
  document.getElementById('modalShare').classList.remove('show');
  window.print();
};

document.getElementById('btnExportJSON').onclick = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `budget-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  document.getElementById('modalExport').classList.remove('show');
};

document.getElementById('btnLoadJSON').onclick = () => {
  document.getElementById('fileInput').click();
};

document.getElementById('fileInput').onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const loaded = JSON.parse(ev.target.result);
      if(confirm('Charger cette sauvegarde ?')) {
        state = loaded;
        save();
        render();
        document.getElementById('modalExport').classList.remove('show');
      }
    } catch {
      alert('Fichier invalide');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

document.getElementById('btnReset').onclick = () => {
  if(confirm('Effacer toutes les données ?')) {
    state = {meta: {}, items: {}};
    save();
    render();
  }
};

render();
</script>
</body>
</html>
